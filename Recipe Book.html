<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=0.95,viewport-fit=cover" />
<title>Recipe Book</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Roxxust/recipe-book/main/recipe-book.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root{
    --dark-bg:#0f0f0f; --card-bg:#181818; --text:#e8eef6; --text-secondary:#9aa3ad;
    --accent:#6fb8ff; --success:#2fe0c6; --border:#2a2a2a; --danger:#ff7b8a;
    --warning:#ffb84d; --info:#4dabf7;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
  html,body{height:100%}
  body{
    background:var(--dark-bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    overflow-x:hidden;
    padding-bottom:88px;
  }
  .container{max-width:1200px;margin:0 auto;padding:20px}
  header{padding:18px 0;text-align:center;border-bottom:1px solid rgba(255,255,255,0.03)}
  header h1{font-size:2rem;color:var(--accent);display:inline-flex;gap:8px;align-items:center}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin:16px 0}
  .button-controls{display:flex;gap:10px;flex-wrap:wrap}
  .btn{background:var(--card-bg);border:1px solid var(--border);padding:10px 14px;border-radius:8px;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:8px;touch-action:manipulation;transition:all 0.2s}
  .btn:hover{background:#2a2a2a}
  .btn-accent{background:var(--accent);color:#000;border:none}
  .btn-accent:hover{background:#5aa5f0}
  .btn-success{background:var(--success);color:#000;border:none}
  .btn-success:hover{background:#28c9b0}
  .btn-danger{background:var(--danger);color:#000;border:none}
  .btn-danger:hover{background:#e66a7a}
  .btn-warning{background:var(--warning);color:#000;border:none}
  .btn-info{background:var(--info);color:#000;border:none}
  .btn-info.active{background:var(--danger);color:#000}
  .btn-favorites{background:#e08aa0;color:#000;border:none}
  .btn-favorites:hover{background:#d07a90}
  .btn-favorites.active{background:#e08aa0;color:#000}
  .category-filter{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--card-bg);padding:8px;border-radius:10px;border:1px solid var(--border);width:100%}
  .categories-container{display:flex;gap:8px;flex-wrap:wrap}
  .category-tag{background:#212121;padding:6px 8px;border-radius:18px;border:1px solid var(--border);cursor:pointer;display:inline-flex;align-items:center;gap:8px;color:var(--text);font-size:.9rem;transition:all 0.2s}
  .category-tag:hover{border-color:var(--accent)}
  .category-tag.active{background:var(--accent);color:#000;border-color:var(--accent)}
  .remove-category{display:inline-flex;width:26px;height:26px;align-items:center;justify-content:center;border-radius:50%}
  .view-mode-toggle{margin-left:auto;display:flex;gap:8px;align-items:center}
  .view-mode-btn{margin-left:6px;width:34px;height:34px;border-radius:6px;background:#232323;border:none;color:var(--text);cursor:pointer;transition:all 0.2s}
  .view-mode-btn:hover{background:#333}
  .view-mode-btn.active{background:var(--accent);color:#000}
  .view-mode-btn.favorites-btn{width:38px;background:#e08aa0;color:#000}
  .view-mode-btn.favorites-btn:hover{background:#d07a90}
  .view-mode-btn.favorites-btn.active{background:#e08aa0;color:#000}
  .recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
  .recipe-card{background:var(--card-bg);border-radius:12px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .16s, border-color 0.2s;position:relative;display:flex;flex-direction:column}
  .recipe-card:hover{transform:translateY(-6px);border-color:var(--accent)}
  .recipe-bookmark{position:absolute;top:8px;right:8px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:all 0.2s}
  .recipe-bookmark:hover{background:var(--danger)}
  .recipe-bookmark.active{background:var(--danger);color:#000}
  .recipe-image{height:160px;background:linear-gradient(180deg,#222,#141414);display:flex;align-items:center;justify-content:center;color:#fff;position:relative;overflow:hidden;flex-shrink:0}
  .recipe-image img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s}
  .recipe-image img:hover{transform:scale(1.05)}
  .recipe-content{padding:4px;display:flex;flex-direction:column;flex:1;min-height:0}
  .recipe-title{font-size:1.05rem;margin-bottom:6px}
  .recipe-category{display:inline-block;padding:4px 10px;border-radius:18px;font-size:.85rem;margin-bottom:6px}
  .recipe-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
  .recipe-tag{background:#2a2a2a;padding:2px 8px;border-radius:12px;font-size:.75rem;color:var(--text-secondary)}
  .recipe-tag::before{content:'#';color:var(--accent);margin-right:2px}

  .recipe-description-container{
    margin-bottom:0;
    height:4.5em;
    overflow:hidden;
    position:relative;
    flex-shrink:0;
  }
  .recipe-description{
    color:var(--text-secondary);
    word-break:break-word;
    white-space:normal;
    line-height:1.5em;
    margin:0;
  }
  .recipe-meta{
    display:flex;
    gap:4px;
    color:var(--text-secondary);
    margin-top:auto;
    font-size:.88rem;
    align-items:center;
    flex-wrap:wrap;
    padding:3px 0;
    flex-shrink:0;
  }
  .recipe-meta .meta-item{display:inline-flex;align-items:center;gap:2px;white-space:nowrap}

  .view-list .recipes-grid{grid-template-columns:1fr}
  .view-list .recipe-card{
    display:flex;
    flex-direction:row;
    align-items:stretch;
    border-radius:10px;
    height:200px;
    overflow:hidden;
  }
  .view-list .recipe-image{
    width:200px;
    min-width:200px;
    height:200px;
    flex-shrink:0;
  }
  .view-list .recipe-content{
    display:flex;
    flex-direction:column;
    padding:4px;
    flex:1;
    min-width:0;
    overflow:hidden;
  }
  .view-list .recipe-description-container{
    flex-shrink:0;
    overflow:hidden;
    margin-bottom:0;
  }
  .view-list .recipe-description{
    overflow:hidden;
  }
  .view-list .recipe-meta{
    margin-top:auto;
    flex-shrink:0;
  }
  .view-list .recipe-tags{
    flex-shrink:0;
    margin-bottom:2px;
  }
  .view-list .recipe-category{
    flex-shrink:0;
  }

  .ingredient-row.placeholder{background:rgba(111,184,255,0.06);border:2px dashed var(--accent);min-height:44px;display:flex;align-items:center;padding:0 10px}
  .ingredient-row.dragging{box-shadow:0 10px 30px rgba(0,0,0,0.65);opacity:0.98}

  .toast-container{position:fixed;bottom:100px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
  .toast{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:14px 18px;min-width:280px;max-width:400px;box-shadow:0 8px 30px rgba(0,0,0,0.5);display:flex;align-items:center;gap:12px;pointer-events:auto;animation:slideIn 0.3s ease;opacity:0;transform:translateX(100%)}
  .toast.show{opacity:1;transform:translateX(0)}
  .toast.hiding{animation:slideOut 0.3s ease forwards}
  .toast-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .toast-success .toast-icon{background:var(--success);color:#000}
  .toast-error .toast-icon{background:var(--danger);color:#000}
  .toast-warning .toast-icon{background:var(--warning);color:#000}
  .toast-info .toast-icon{background:var(--info);color:#000}
  .toast-timer .toast-icon{background:var(--accent);color:#000}
  .toast-message{flex:1;color:var(--text);font-size:.95rem}
  .toast-timer .toast-message{font-variant-numeric:tabular-nums;font-weight:bold}
  .toast-close{background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:4px}
  @keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(100%)}}

  .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:1000;opacity:0;visibility:hidden;transition:all .18s}
  .modal.active{opacity:1;visibility:visible}
  .modal-content{background:var(--card-bg);width:95%;max-width:900px;border-radius:12px;max-height:90vh;overflow:auto;border:1px solid var(--border);-webkit-overflow-scrolling:touch}
  .modal-header{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card-bg);z-index:10}
  .modal-title{color:var(--accent)}
  .modal-header-actions{display:flex;gap:8px;align-items:center}
  .modal-action-btn{width:40px;height:40px;border-radius:8px;background:#2a2a2a;border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;touch-action:manipulation}
  .modal-action-btn:hover{background:#3a3a3a}
  .modal-action-btn.favorites-btn{background:#e08aa0;color:#000}
  .modal-action-btn.favorites-btn:hover{background:#d07a90}
  .modal-action-btn.close-btn{background:#2a2a2a;color:var(--text)}
  .modal-action-btn.close-btn:hover{background:#ff4757}
  .close-modal{background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer}
  .modal-body{padding:12px}
  .section-title{color:var(--accent);margin-top:12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .ingredients-list,.instructions-list{list-style:none;padding:0;margin:0}
  .instructions-list{counter-reset: instruction-counter}
  .instructions-list li{counter-increment: instruction-counter}
  .instructions-list li::before{content: counter(instruction-counter) ". ";font-weight:bold;color:var(--accent);margin-right:6px}
  .ingredients-list li{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);transition:all .12s;cursor:pointer;flex-wrap:wrap}
  .ingredients-list li.state-added{background:rgba(47,224,198,.06);border-left:4px solid var(--success)}
  .ingredients-list li .converted-amount{color:var(--text-secondary);font-size:.85rem;margin-left:8px;padding:2px 6px;background:#1a1a1a;border-radius:4px}

  .scaling-controls{display:flex;align-items:center;gap:8px;margin:12px 0;padding:12px;background:#202020;border-radius:10px;flex-wrap:wrap}
  .scaling-controls label{color:var(--text-secondary);font-size:.9rem}
  .scaling-btn{padding:8px 14px;border-radius:6px;background:#2a2a2a;border:none;color:var(--text);cursor:pointer;font-size:.9rem;transition:all 0.2s}
  .scaling-btn:hover{background:var(--accent);color:#000}
  .scaling-btn.active{background:var(--accent);color:#000}
  .scaling-display{color:var(--text);font-weight:bold;min-width:60px;text-align:center}

  .timer-section{margin-top:12px;padding:12px;background:#202020;border-radius:10px}
  .timer-display{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .timer-input{width:100px;padding:10px;border-radius:8px;background:#151515;border:1px solid var(--border);color:var(--text);text-align:center;font-size:1.1rem;font-variant-numeric:tabular-nums}
  .timer-input:focus{border-color:var(--accent);outline:none}
  .timer-btn{width:44px;height:44px;border-radius:8px;background:#2a2a2a;border:none;color:var(--text);cursor:pointer;font-size:1rem;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
  .timer-btn:hover{background:var(--accent);color:#000}
  .timer-btn.active{background:var(--success);color:#000}
  .timer-btn.alerting{background:var(--danger);color:#000;animation:pulse 0.5s ease infinite}
  .timer-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .timer-preset{padding:6px 12px;border-radius:6px;background:#151515;border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:.85rem;transition:all 0.2s}
  .timer-preset:hover{border-color:var(--accent)}
  .timer-alert-info{color:var(--text-secondary);font-size:.85rem;margin-top:8px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

  .form-container,.edit-ui{background:var(--card-bg);padding:14px;border-radius:12px;border:1px solid var(--border);margin-top:14px;overflow:hidden}
  .form-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .form-title{color:var(--accent)}
  .edit-ui-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  label{display:block;margin-bottom:6px;color:var(--text-secondary)}
  .label-hint{font-size:.8rem;color:var(--text-secondary);margin-top:4px}
  input,textarea,select{width:100%;padding:10px;border-radius:8px;background:#222;border:1px solid var(--border);color:var(--text);min-width:0}
  textarea{min-height:90px;resize:vertical}
  .ingredient-row{display:flex;gap:8px;align-items:center;padding:8px;background:#202020;border-radius:8px;margin-bottom:8px;position:relative;min-height:44px;min-width:0}
  .ingredient-row .drag-handle{width:36px;height:36px;border-radius:8px;background:none;border:none;color:var(--text-secondary);cursor:grab;display:flex;align-items:center;justify-content:center;touch-action:none;flex:0 0 36px}
  .ingredient-name{flex:0 0 45%;min-width:0;padding:8px;border-radius:6px;background:#151515;border:1px solid rgba(255,255,255,0.02); font-size:15px;}
  .ingredient-amount{flex:0 0 15%;min-width:40px;padding:8px;border-radius:6px;background:#151515;border:1px solid rgba(255,255,255,0.02); font-size:15px;}
  .ingredient-unit{flex:0 0 18%;min-width:70px;padding:8px;border-radius:6px;background:#151515;border:1px solid rgba(255,255,255,0.02)}
  .remove-ingredient{flex:0 0 34px;width:34px;height:34px;border-radius:50%;background:var(--danger);border:none;display:flex;align-items:center;justify-content:center;color:#000;cursor:pointer;margin-left:6px}
  .add-ingredient-btn{width:100%;padding:10px;border-radius:8px;border:1px dashed var(--border);background:#1f1f1f;color:var(--text);margin-top:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s}
  .add-ingredient-btn:hover{border-color:var(--accent);background:#252525}
  .image-upload-area{border:2px dashed var(--border);padding:12px;border-radius:8px;background:#171717;position:relative;cursor:pointer;transition:border-color 0.2s}
  .image-upload-area:hover{border-color:var(--accent)}
  .image-preview{margin-top:10px;max-height:200px;overflow:hidden;border-radius:8px;display:none;position:relative}
  .image-preview img{width:100%;height:auto;display:block}
  .remove-image-btn{position:absolute;right:8px;top:8px;width:34px;height:34px;border-radius:50%;border:none;background:var(--danger);display:flex;align-items:center;justify-content:center;color:#000;cursor:pointer;display:none}
  .form-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
  .empty-state{padding:24px;border:1px dashed var(--border);border-radius:10px;color:var(--text-secondary);text-align:center;margin-top:12px}

  .tags-input-container{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:#222;border-radius:8px;border:1px solid var(--border);min-height:44px}
  .tag-item{background:#2a2a2a;padding:4px 10px;border-radius:16px;display:flex;align-items:center;gap:6px;font-size:.85rem}
  .tag-item .remove-tag{cursor:pointer;color:var(--text-secondary);font-size:.8rem}
  .tag-item .remove-tag:hover{color:var(--danger)}
  .tags-input{flex:1;min-width:120px;background:transparent;border:none;color:var(--text);outline:none;padding:4px}

  .image-zoom-modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1500;display:none;align-items:center;justify-content:center}
  .image-zoom-modal.active{display:flex}
  .image-zoom-modal img{max-width:95%;max-height:95%;object-fit:contain}
  .image-zoom-close{position:absolute;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:1.5rem;cursor:pointer}

  .search-container{flex:1;min-width:200px;max-width:400px}
  .search-input{width:100%;padding:10px 14px;border-radius:8px;background:#222;border:1px solid var(--border);color:var(--text);display:flex;align-items:center;gap:10px}
  .search-input input{background:transparent;border:none;color:var(--text);flex:1;outline:none}
  .search-input i{color:var(--text-secondary)}

  *:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,.category-tag:focus-visible,.view-mode-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  @media (min-width:980px){
    .ingredient-name{font-size:15px}
  }
  @media (max-width:979px){
    .view-list .recipe-card{height:auto;display:block}
    .view-list .recipe-image{width:100%;height:160px;min-width:auto}
    .view-list .recipe-content{padding:12px}
    .ingredient-amount{min-width:48px}
    .ingredient-unit{min-width:60px}
    .ingredient-name{font-size:15px}
    .container{padding:12px}
    .btn{padding:9px 10px}
    .form-container,.edit-ui{padding:12px}
    .modal-action-btn{width:44px;height:44px}
  }
  @media (max-width:420px){
    .ingredient-name{flex-basis:45%;padding:7px;font-size:15px}
    .ingredient-amount{flex-basis:15%;min-width:40px;padding:7px}
    .ingredient-unit{flex-basis:18%;min-width:60px;padding:7px}
    .remove-ingredient{width:34px;height:34px}
    .view-mode-toggle{display:flex;gap:6px}
    .scaling-controls{justify-content:center}
    .timer-input{width:80px}
  }
  @media (max-width: 768px) {
    .recipes-grid { grid-template-columns: repeat(2, 1fr); }
    .controls { flex-direction: column; align-items: stretch; }
    .button-controls { justify-content: center; }
    .search-container { max-width: none; }
    .toast-container { left: 20px; right: 20px; bottom: 80px; }
    .toast { min-width: auto; }
  }
</style>
</head>
<body>
  <div class="container">
    <header><h1><i class="fas fa-utensils"></i> Recipe Book</h1></header>
    <div class="controls">
      <div class="button-controls">
        <button class="btn btn-success" id="exportDataBtn"><i class="fas fa-file-export"></i> Export</button>
        <button class="btn btn-success" id="importDataBtn"><i class="fas fa-file-import"></i> Import</button>
        <button class="btn btn-accent" id="addRecipeBtn"><i class="fas fa-plus"></i> Add Recipe</button>
      </div>
      <div class="search-container">
        <div class="search-input">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search recipes, ingredients, tags...">
        </div>
      </div>
      <div class="category-filter">
        <div class="categories-container" id="categoriesContainer"></div>
        <div class="view-mode-toggle" role="toolbar" aria-label="View mode">
          <button class="view-mode-btn favorites-btn" id="favoritesFilterBtn" title="Favorites"><i class="far fa-heart"></i></button>
          <span style="font-size:.9rem;color:var(--text-secondary);margin-left:4px">View:</span>
          <button class="view-mode-btn grid-mode active" id="gridModeBtn" title="Grid"><i class="fas fa-th"></i></button>
          <button class="view-mode-btn list-mode" id="listModeBtn" title="List"><i class="fas fa-list"></i></button>
        </div>
      </div>
    </div>

    <div id="recipesContainer" class="recipes-container">
      <div id="emptyState" class="empty-state"><i class="fas fa-book-open" style="font-size:2rem;margin-bottom:8px;display:block"></i><h3>No recipes yet</h3><p>Tap Add Recipe to start.</p></div>
      <div id="recipesGrid" class="recipes-grid" aria-live="polite"></div>
    </div>

    <!-- Add Form -->
    <div id="addRecipeForm" class="form-container" style="display:none;">
      <div class="form-header"><h2 class="form-title"><i class="fas fa-receipt"></i> Add Recipe</h2><button class="btn" id="closeAddFormBtn">&times;</button></div>
      <form id="addRecipeFormInner">
        <div class="form-group"><label>Category</label><select id="addRecipeCategory" required></select></div>
        <div class="form-group"><label>Title</label><input id="addRecipeTitle" required></div>
        <div style="margin-top:8px" class="image-upload-container">
          <label>Image</label>
          <div class="image-upload-area" id="addImageUploadArea">
            <label for="addImageUpload" style="display:block;cursor:pointer"><i class="fas fa-cloud-upload-alt"></i><p id="addImageHint" style="color:var(--text-secondary)">click or tap to choose photo</p></label>
            <input type="file" id="addImageUpload" accept="image/*" style="display:none">
            <div class="image-preview" id="addImagePreview"><img id="addImagePreviewImg" alt="preview"></div>
            <button type="button" class="remove-image-btn" id="removeAddImageBtn" title="Remove image"><i class="fas fa-times"></i></button>

  class IndexedDBWrapper {
    constructor() {
      this.db = null;
      this.useIndexedDB = typeof indexedDB !== 'undefined';
    }

    async open() {
      if (!this.useIndexedDB) return false;
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
          this.db = request.result;
          resolve(true);
        };
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_RECIPES)) {
            db.createObjectStore(STORE_RECIPES, { keyPath: 'id' });
          }
          if (!db.objectStoreNames.contains(STORE_CATEGORIES)) {
            db.createObjectStore(STORE_CATEGORIES, { keyPath: 'id' });
          }
        };
      });
    }

    async getAll(storeName) {
      if (!this.db) return null;
      return new Promise((resolve, reject) => {
        const tx = this.db.transaction(storeName, 'readonly');
        const store = tx.objectStore(storeName);
        const request = store.getAll();
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
      });
    }

    async put(storeName, item) {
      if (!this.db) return false;
      return new Promise((resolve, reject) => {
        const tx = this.db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        const request = store.put(item);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(true);
      });
    }

    async delete(storeName, key) {
      if (!this.db) return false;
      return new Promise((resolve, reject) => {
        const tx = this.db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        const request = store.delete(key);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(true);
      });
    }

    async clear(storeName) {
      if (!this.db) return false;
      return new Promise((resolve, reject) => {
        const tx = this.db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        const request = store.clear();

  /* ==================== FRACTION PARSING (FIXED) ==================== */
  function parseFractionAmount(amountStr) {
    if (!amountStr || typeof amountStr !== 'string') return { value: 0, original: amountStr || '' };

    const trimmed = amountStr.trim();
    if (!trimmed) return { value: 0, original: '' };

    // Check for mixed fraction: "1 1/2" or "2 3/4"
    const mixedMatch = trimmed.match(/^(\d+)\s+(\d+)\/(\d+)$/);
    if (mixedMatch) {
      const whole = parseInt(mixedMatch[1], 10);
      const num = parseInt(mixedMatch[2], 10);
      const denom = parseInt(mixedMatch[3], 10);
      if (denom !== 0) {
        return { value: whole + (num / denom), original: trimmed };
      }
    }

    // Check for simple fraction: "1/3" or "3/4"
    const fractionMatch = trimmed.match(/^(\d+)\/(\d+)$/);
    if (fractionMatch) {
      const num = parseInt(fractionMatch[1], 10);
      const denom = parseInt(fractionMatch[2], 10);
      if (denom !== 0) {
        return { value: num / denom, original: trimmed };
      }
    }

    // Check for decimal or whole number
    const numValue = parseFloat(trimmed);
    if (!isNaN(numValue)) {
      return { value: numValue, original: trimmed };
    }

    return { value: 0, original: trimmed };
  }

  function formatScaledAmount(originalAmount, scale) {
    const parsed = parseFractionAmount(originalAmount);
    if (parsed.value === 0 && !parsed.original) return '';

    // If scale is 1x, always return the original amount string unchanged
    if (scale === 1) {
      return parsed.original;
    }

    const scaledValue = parsed.value * scale;

    // Format the scaled value
    if (scaledValue % 1 === 0) {
      return scaledValue.toString();
    }

    // Check if scaled value matches a common fraction
    const commonFractions = [
      { value: 0.125, display: '1/8' },
      { value: 0.25, display: '1/4' },
      { value: 0.333333, display: '1/3' },
      { value: 0.375, display: '3/8' },
      { value: 0.5, display: '1/2' },
      { value: 0.625, display: '5/8' },
      { value: 0.666666, display: '2/3' },
      { value: 0.75, display: '3/4' },
      { value: 0.875, display: '7/8' }
    ];

    const fractionalPart = scaledValue - Math.floor(scaledValue);
    const wholePart = Math.floor(scaledValue);

    for (const frac of commonFractions) {
      if (Math.abs(fractionalPart - frac.value) < 0.01) {
        if (wholePart === 0) {
          return frac.display;
        } else {
          return `${wholePart} ${frac.display}`;
        }
      }
    }

    // Default to decimal with 2 decimal places
    return scaledValue.toFixed(2);
  }

    await loadData();
    await loadSettings();

    applyViewMode();

    if (!categories || categories.length === 0) categories = ['Cookies'];

    renderCategories();
    populateCategoryDropdowns();
    renderRecipes();
    setupEventListeners();
    setupTagsInput(addTagsInput, addTagsContainer, () => currentTags);
    setupTagsInput(editTagsInput, editTagsContainer, () => editCurrentTags);
    clearContainer(addIngredientsContainer);
    addIngredientField(addIngredientsContainer);
    clearContainer(editIngredientsContainer);
    addIngredientField(editIngredientsContainer);
    initImageObserver();
    updateScaleButtons();
    updateTimerDisplay();

    await restoreTimerState();

    descriptionScrollObserver.observe(document.body, { childList: true, subtree: true });

    showToast('Recipe Book loaded', 'success', 2000);
  }

  /* ==================== TIMER PERSISTENCE ==================== */
  async function saveTimerState() {
    try {
      const timerState = {
        timerSeconds,
        timerInitialSeconds,
        timerRunning,
        timerAlertActive,
        timerAlertStartTime,
        timerLastSaved: Date.now()
      };
      localStorage.setItem('recipeBookTimerState', JSON.stringify(timerState));
    } catch (e) {
      console.warn('Failed to save timer state', e);
    }
  }

  async function restoreTimerState() {
    try {
      const saved = localStorage.getItem('recipeBookTimerState');
      if (!saved) return;

      const state = JSON.parse(saved);
      const now = Date.now();
      const elapsedSeconds = Math.floor((now - state.timerLastSaved) / 1000);

      timerSeconds = state.timerSeconds;
      timerInitialSeconds = state.timerInitialSeconds;
      timerAlertActive = state.timerAlertActive || false;
      timerAlertStartTime = state.timerAlertStartTime || 0;

      if (state.timerRunning && !state.timerAlertActive) {
        timerSeconds = Math.max(0, timerSeconds - elapsedSeconds);
        if (timerSeconds > 0) {
          timerRunning = true;
          startTimerInterval();
          updateTimerToast();
          showToast('Timer restored', 'info', 3000);
        }
      }

      if (state.timerAlertActive) {
        const alertElapsed = now - state.timerAlertStartTime;
        if (alertElapsed < timerAlertDuration) {
          timerAlertActive = true;
          timerStartBtn.classList.add('alerting');
          timerStartBtn.innerHTML = '<i class="fas fa-stop"></i>';
          startTimerAlert();
          updateTimerToast();
        } else {
          timerAlertActive = false;
          updateTimerToast();
        }
      }

      updateTimerDisplay();
    } catch (e) {
      console.warn('Failed to restore timer state', e);
    }
  }

  /* ==================== INDEXEDDB MIGRATION ==================== */
  async function migrateFromLocalStorage() {
    const localRecipes = localStorage.getItem('recipeBookRecipes');
    const localCategories = localStorage.getItem('recipeBookCategories');

    if (localRecipes && dbWrapper.db) {
      const parsedRecipes = JSON.parse(localRecipes);
      if (Array.isArray(parsedRecipes) && parsedRecipes.length > 0) {
        const existing = await dbWrapper.getAll(STORE_RECIPES) || [];
        if (existing.length === 0) {
          for (const recipe of parsedRecipes) {
            await dbWrapper.put(STORE_RECIPES, recipe);
          }
          showToast('Migrated to IndexedDB', 'info', 3000);
        }
      }
    }

    if (localCategories && dbWrapper.db) {
      const parsedCategories = JSON.parse(localCategories);
      if (Array.isArray(parsedCategories) && parsedCategories.length > 0) {
        const existing = await dbWrapper.getAll(STORE_CATEGORIES) || [];
        if (existing.length === 0) {
          await dbWrapper.put(STORE_CATEGORIES, { id: 'categories', items: parsedCategories });
        }
      }
    }
  }

  async function loadData() {
    if (dbWrapper.db) {
      const recipesData = await dbWrapper.getAll(STORE_RECIPES);
      const categoriesData = await dbWrapper.getAll(STORE_CATEGORIES);
      recipes = recipesData || [];
      categories = categoriesData?.[0]?.items || [];
    } else {
      recipes = JSON.parse(localStorage.getItem('recipeBookRecipes')) || [];
      categories = JSON.parse(localStorage.getItem('recipeBookCategories')) || [];
    }
  }

  async function saveData() {
    if (dbWrapper.db) {
      for (const recipe of recipes) {
        await dbWrapper.put(STORE_RECIPES, recipe);
      }
      await dbWrapper.put(STORE_CATEGORIES, { id: 'categories', items: categories });
    } else {
      try {
        localStorage.setItem('recipeBookRecipes', JSON.stringify(recipes));
        localStorage.setItem('recipeBookCategories', JSON.stringify(categories));
      } catch (e) {
        showToast('Storage full - some images removed', 'warning');
        recipes.forEach(r => { if (r.image && r.image.length > 500000) r.image = ''; });
        localStorage.setItem('recipeBookRecipes', JSON.stringify(recipes));
      }
    }
  }

  /* ==================== IMAGE HANDLING ==================== */
  function initImageObserver() {
    if ('IntersectionObserver' in window) {
      imageObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            if (img.dataset.src) {
              img.src = img.dataset.src;
              img.removeAttribute('data-src');
              imageObserver.unobserve(img);
            }
          }
        });
      }, { rootMargin: '100px' });
    }
  }

  function handleImageUpload(e, mode) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      showToast('Please select an image file', 'error');
      return;
    }

    showToast('Processing image...', 'info', 1500);

    const reader = new FileReader();
    reader.onload = function(ev) {
      if (file.size < 900000) {
        assignImage(mode, ev.target.result);
        return;
      }
      const img = new Image();
      img.onload = function() {
        const MAX_W = 1000;
        const scale = img.width > MAX_W ? MAX_W / img.width : 1;
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const data = canvas.toDataURL('image/jpeg', 0.78);
        assignImage(mode, data);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function assignImage(mode, dataUrl) {
    if (mode === 'add' && addRecipeImageFile) {
      revokeBlobUrl(addRecipeImageFile);
    } else if (mode === 'edit' && editRecipeImageFile) {
      revokeBlobUrl(editRecipeImageFile);
    }

    trackBlobUrl(dataUrl);

    if (mode === 'add') {
      addImagePreview.style.display = 'block';
      addImagePreviewImg.src = dataUrl;
      removeAddImageBtn.style.display = 'flex';
      addRecipeImageFile = dataUrl;
      showToast('Image loaded', 'success', 1500);
    } else {
      editImagePreview.style.display = 'block';
      editImagePreviewImg.src = dataUrl;
      removeEditImageBtn.style.display = 'flex';
      editRecipeImageFile = dataUrl;
      showToast('Image loaded', 'success', 1500);
    }
  }

  /* ==================== TAGS SYSTEM ==================== */
  function setupTagsInput(input, container, getTagsFn) {
    input.addEventListener('blur', () => {
      const value = input.value.trim();
      if (value) {
        const newTags = value.split(',').map(t => t.trim()).filter(t => t);
        newTags.forEach(tag => {
          if (!getTagsFn().includes(tag)) {
            getTagsFn().push(tag);
          }
        });
        input.value = '';
        renderTagsInput(input, container, getTagsFn);
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const value = input.value.trim();
        if (value) {
          const newTags = value.split(',').map(t => t.trim()).filter(t => t);
          newTags.forEach(tag => {
            if (!getTagsFn().includes(tag)) {
              getTagsFn().push(tag);
            }
          });
          input.value = '';
          renderTagsInput(input, container, getTagsFn);
        }
      }
    });
  }

  function renderTagsInput(input, container, getTagsFn) {
    const existingTags = container.querySelectorAll('.tag-item');
    existingTags.forEach(tag => tag.remove());

    getTagsFn().forEach((tag, index) => {
      const tagEl = document.createElement('div');
      tagEl.className = 'tag-item';
      tagEl.innerHTML = `
        <span>${escapeHtml(tag)}</span>
        <span class="remove-tag" data-index="${index}"><i class="fas fa-times"></i></span>
      `;
      container.insertBefore(tagEl, input);

      tagEl.querySelector('.remove-tag').addEventListener('click', () => {
        getTagsFn().splice(index, 1);
        renderTagsInput(input, container, getTagsFn);
      });
    });
  }

  /* ==================== UTILS ==================== */
  function clearContainer(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/[&<>"'\/]/g, function (s) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;' })[s];
    });
  }

  function isSafeImageSrc(src) {
    if (!src || typeof src !== 'string') return false;
    const s = src.trim();
    return s.startsWith('data:image/') || s.startsWith('blob:') || s.startsWith('http://') || s.startsWith('https://');
  }

  function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
      const later = () => {
        clearTimeout(timeout);
        func(...args);
      };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  }

  function parseTimerInput(value) {
    if (!value) return null;
    value = value.trim();

    const parts = value.split(':');
    if (parts.length === 2) {
      const mins = parseInt(parts[0], 10);
      const secs = parseInt(parts[1], 10);
      if (!isNaN(mins) && !isNaN(secs) && mins >= 0 && secs >= 0) {
        return mins * 60 + secs;
      }
    }

    const minsOnly = parseInt(value, 10);
    if (!isNaN(minsOnly) && minsOnly > 0) {
      return minsOnly * 60;
    }

    return null;
  }

  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  }

  /* ==================== MEASUREMENT CONVERSION ==================== */
  const imperialToMetric = {
    'tsp': { factor: 4.92892, to: 'ml' },
    'tbsp': { factor: 14.7868, to: 'ml' },
    'cup': { factor: 236.588, to: 'ml' },
    'cups': { factor: 236.588, to: 'ml' },
    'fl oz': { factor: 29.5735, to: 'ml' },
    'oz': { factor: 28.3495, to: 'g' },
    'lb': { factor: 453.592, to: 'g' },
    'lbs': { factor: 453.592, to: 'g' },
    'pint': { factor: 473.176, to: 'ml' },
    'quart': { factor: 946.353, to: 'ml' },
    'gallon': { factor: 3785.41, to: 'ml' }
  };

  function convertMetricToImperial(amount, unit) {
    if (!amount || !unit) return '';
    const numAmount = parseFloat(amount);
    if (isNaN(numAmount) || numAmount <= 0) return '';

    const lowerUnit = unit.toLowerCase();

    if (lowerUnit === 'ml' || lowerUnit === 'l') {
      const mlAmount = lowerUnit === 'l' ? numAmount * 1000 : numAmount;

      if (mlAmount >= 3785.41) {
        const converted = mlAmount / 3785.41;
        return `${formatConversionAmount(converted)} gallon${converted >= 2 ? 's' : ''}`;
      }
      if (mlAmount >= 946.353) {
        const converted = mlAmount / 946.353;
        return `${formatConversionAmount(converted)} quart${converted >= 2 ? 's' : ''}`;
      }
      if (mlAmount >= 473.176) {
        const converted = mlAmount / 473.176;
        return `${formatConversionAmount(converted)} pint${converted >= 2 ? 's' : ''}`;
      }
      if (mlAmount >= 236.588) {
        const converted = mlAmount / 236.588;
        return `${formatConversionAmount(converted)} ${converted >= 2 ? 'cups' : 'cup'}`;
      }
      if (mlAmount >= 14.7868) {
        const converted = mlAmount / 14.7868;
        return `${formatConversionAmount(converted)} tbsp`;
      }
      const converted = mlAmount / 4.92892;
      return `${formatConversionAmount(converted)} tsp`;
    }

    if (lowerUnit === 'g' || lowerUnit === 'kg') {
      const gAmount = lowerUnit === 'kg' ? numAmount * 1000 : numAmount;

      if (gAmount >= 453.592) {
        const converted = gAmount / 453.592;
        return `${formatConversionAmount(converted)} ${converted >= 2 ? 'lbs' : 'lb'}`;
      }
      const converted = gAmount / 28.3495;
      return `${formatConversionAmount(converted)} oz`;
    }

    return '';
  }

  function convertImperialToMetric(amount, unit) {
    if (!amount || !unit) return '';
    const numAmount = parseFloat(amount);
    if (isNaN(numAmount)) return '';

    const conversion = imperialToMetric[unit.toLowerCase()];
    if (!conversion) return '';

    const converted = numAmount * conversion.factor;
    let displayConverted = converted;
    let displayUnit = conversion.to;

    if (converted >= 1000 && conversion.to === 'ml') {
      displayConverted = converted / 1000;
      displayUnit = 'l';
    }
    if (converted >= 1000 && conversion.to === 'g') {
      displayConverted = converted / 1000;
      displayUnit = 'kg';
    }

    return `${formatConversionAmount(displayConverted)} ${displayUnit}`;
  }

  function formatConversionAmount(num) {
    if (num >= 100) return Math.round(num).toString();
    if (num >= 10) return num.toFixed(1);
    if (num >= 1) return num.toFixed(2);
    if (num >= 0.1) return num.toFixed(2);
    return num.toFixed(3);
  }

  function getConversion(amount, unit) {
    if (!amount || !unit) return '';
    const lowerUnit = unit.toLowerCase();

    if (imperialToMetric[lowerUnit]) {
      return convertImperialToMetric(amount, unit);
    }
    if (['ml', 'l', 'g', 'kg'].includes(lowerUnit)) {
      return convertMetricToImperial(amount, unit);
    }
    return '';
  }

  /* ==================== RECIPE CARD DESCRIPTION SCROLLING ==================== */
  function initDescriptionScroll(card, description) {
    const cardId = card.dataset.id;
    const descContainer = card.querySelector('.recipe-description-container');
    const descEl = card.querySelector('.recipe-description');

    if (!descContainer || !descEl) return;

    stopDescriptionScroll(cardId);

    const textContent = description || '';
    const charThreshold = currentViewMode === 'list'
      ? SCROLL_CONFIG.listCharThreshold
      : SCROLL_CONFIG.gridCharThreshold;

    if (textContent.length <= charThreshold) {
      descEl.textContent = textContent;
      descEl.style.transform = '';
      return;
    }

    descEl.textContent = textContent;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const containerHeight = descContainer.clientHeight;
        const contentHeight = descEl.scrollHeight;
        const maxScroll = contentHeight - containerHeight;

        if (maxScroll <= 0) {
          descEl.style.transform = '';
          return;
        }

        runScrollCycle(cardId, descEl, maxScroll);
      });
    });
  }

  function stopDescriptionScroll(cardId) {
    const state = descriptionScrollStates.get(cardId);
    if (state) {
      if (state.animationFrameId) {
        cancelAnimationFrame(state.animationFrameId);
      }
      descriptionScrollStates.delete(cardId);
    }
  }

  function runScrollCycle(cardId, descEl, maxScroll) {
    const state = {
      phase: 'topPause',
      position: 0,
      maxScroll: maxScroll,
      startTime: performance.now(),
      phaseStartTime: performance.now()
    };

    descriptionScrollStates.set(cardId, state);

    function animate(currentTime) {
      const currentState = descriptionScrollStates.get(cardId);
      if (!currentState) return;

      const elapsed = currentTime - currentState.phaseStartTime;

      switch (currentState.phase) {
        case 'topPause':
          if (elapsed >= SCROLL_CONFIG.topPauseMs) {
            currentState.phase = 'scrollDown';
            currentState.phaseStartTime = currentTime;
            currentState.startPosition = currentState.position;
          }
          break;

        case 'scrollDown': {
          const distanceToScroll = currentState.maxScroll - currentState.startPosition;
          const timeNeeded = (distanceToScroll / SCROLL_CONFIG.scrollSpeed) * 1000;
          const progress = Math.min(elapsed / timeNeeded, 1);
          currentState.position = currentState.startPosition + (distanceToScroll * progress);

          if (progress >= 1) {
            currentState.phase = 'bottomPause';
            currentState.phaseStartTime = currentTime;
            currentState.position = currentState.maxScroll;
          }
          break;
        }

        case 'bottomPause':
          if (elapsed >= SCROLL_CONFIG.bottomPauseMs) {
            currentState.phase = 'resetUp';
            currentState.phaseStartTime = currentTime;
            currentState.startPosition = currentState.position;
          }
          break;

        case 'resetUp': {
          const distanceToReset = currentState.startPosition;
          const timeNeeded = (distanceToReset / SCROLL_CONFIG.resetSpeed) * 1000;
          const progress = Math.min(elapsed / timeNeeded, 1);
          currentState.position = currentState.startPosition - (distanceToReset * progress);

          if (progress >= 1) {
            currentState.phase = 'topPause';
            currentState.phaseStartTime = currentTime;
            currentState.position = 0;
          }
          break;
        }
      }

      descEl.style.transform = `translateY(-${currentState.position}px)`;
      currentState.animationFrameId = requestAnimationFrame(animate);
    }

    state.animationFrameId = requestAnimationFrame(animate);
  }

  function renderRecipes() {

    if (currentFilterCategory !== 'all') {

  function getCategoryGradient(category) {
    const colors = [
      'linear-gradient(45deg,#3a0ca3,#4361ee)',
      'linear-gradient(45deg,#4cc9f0,#4895ef)',
      'linear-gradient(45deg,#f72585,#b5179e)',
      'linear-gradient(45deg,#4cc9f0,#59baac)',
      'linear-gradient(45deg,#f8961e,#f3722c)',
      'linear-gradient(45deg,#1a2a6c,#b21f1f)',
      'linear-gradient(45deg,#00c6ff,#0072ff)',
      'linear-gradient(45deg,#ff416c,#ff4b2b)',
      'linear-gradient(45deg,#2c3e50,#4a235a)',
      'linear-gradient(45deg,#00b09b,#96c93d)',
      'linear-gradient(45deg,#5614b0,#dbd65c)',
      'linear-gradient(45deg,#e94057,#f27121)',
      'linear-gradient(45deg,#1d976c,#93f9b9)',
      'linear-gradient(45deg,#5f0f40,#9a031e)',
      'linear-gradient(45deg,#004e92,#000428)',
      'linear-gradient(45deg,#8e2de2,#4a00e0)',
      'linear-gradient(45deg,#ff00cc,#333333)',
      'linear-gradient(45deg,#00b4d8,#023e8a)',
      'linear-gradient(45deg,#9d0208,#67060c)',
      'linear-gradient(45deg,#1a237e,#311b92)'
    ];
    let hash = 0;
    for (let i = 0; i < category.length; i++) {
      hash = (hash << 5) - hash + category.charCodeAt(i);
      hash |= 0;
    }
    return colors[Math.abs(hash) % colors.length];
  }

  function formatTimeValue(val) {
    if (!val) return '';
    const str = String(val).trim();
    if (/^\d+$/.test(str)) {
      return str + 'm';

    return str;
  }

  function formatTempValue(val) {
    if (!val) return '';
    const str = String(val).trim();
    if (/^\d+$/.test(str)) {
      return str + '°';
    }
    return str;
  }

  function updateScaledIngredients() {
    if (!currentViewRecipe) return;
    clearContainer(modalIngredientsList);

    currentViewRecipe.ingredientStates = currentViewRecipe.ingredientStates || [];
    while (currentViewRecipe.ingredientStates.length < (currentViewRecipe.ingredients ? currentViewRecipe.ingredients.length : 0)) {
      currentViewRecipe.ingredientStates.push('');
    }

    if (currentViewRecipe.ingredients && currentViewRecipe.ingredients.length > 0) {
      currentViewRecipe.ingredients.forEach((ing, idx) => {
        const li = document.createElement('li');
        li.dataset.index = idx;
        const left = document.createElement('span');
        left.textContent = ing.name || '';
        const right = document.createElement('span');

        // Use fraction-aware formatting - preserves original at 1x scale
        const displayAmount = formatScaledAmount(ing.amount || '', currentScale);
        let amountText = displayAmount ? `${displayAmount}${ing.unit ? ' ' + ing.unit : ''}` : (ing.unit || '');

        if (ing.amount && ing.unit) {
          const parsed = parseFractionAmount(ing.amount);
          if (parsed.value > 0) {
            const converted = getConversion(parsed.value.toString(), ing.unit);
            if (converted) {
              const convertedParts = converted.split(' ');
              const convertedNum = parseFloat(convertedParts[0]) || 0;
              const convertedUnit = convertedParts.slice(1).join(' ');
              const scaledConvertedAmount = convertedNum * currentScale;
              const scaledConverted = `${formatConversionAmount(scaledConvertedAmount)} ${convertedUnit}`;
              amountText += ` <span class="converted-amount">(${scaledConverted})</span>`;
            }
          }
        }

        right.innerHTML = amountText;
        li.appendChild(left);
        li.appendChild(right);
        if (currentViewRecipe.ingredientStates[idx] === 'state-added') {
          li.classList.add('state-added');
        }
        modalIngredientsList.appendChild(li);
      });
    }
  }

  function toggleCurrentRecipeBookmark() {
    if (!currentViewRecipe) return;
    currentViewRecipe.bookmarked = !currentViewRecipe.bookmarked;
    saveData();
    modalBookmarkBtn.innerHTML = currentViewRecipe.bookmarked
      ? '<i class="fas fa-heart" style="color:#000"></i>'
      : '<i class="far fa-heart"></i>';
    renderRecipes();
    showToast(currentViewRecipe.bookmarked ? 'Added to favorites' : 'Removed from favorites', 'info');
  }

  function openRecipeModal() {
    recipeModal.classList.add('active');
    recipeModal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeRecipeModal() {
    recipeModal.classList.remove('active');
    recipeModal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    pauseTimer();
    currentViewRecipe = null;
  }

  async function deleteRecipe(id) {
    if (!confirm('Delete this recipe?')) return;

    const recipe = recipes.find(r => r.id === id);
    if (recipe && recipe.image) {
      revokeBlobUrl(recipe.image);
    }

    recipes = recipes.filter(r => r.id !== id);

    if (dbWrapper.db) {
      try {
        await dbWrapper.delete(STORE_RECIPES, id);
      } catch (e) {
        console.warn('Failed to delete from IndexedDB', e);
      }
    }

    saveData();
    renderCategories();
    renderRecipes();
    closeRecipeModal();
    hideEditUI();
    showToast('Recipe deleted', 'success');
  }

  /* ==================== COOK TIMER (PERSISTENT) ==================== */
  function updateTimerDisplay() {
    timerInput.value = formatTime(timerSeconds);
  }

  function playChime() {
    try {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.frequency.value = 880;
      oscillator.type = 'sine';
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.5);

      setTimeout(() => {
        const osc2 = audioContext.createOscillator();
        const gain2 = audioContext.createGain();
        osc2.connect(gain2);
        gain2.connect(audioContext.destination);
        osc2.frequency.value = 1100;
        osc2.type = 'sine';
        gain2.gain.setValueAtTime(0.3, audioContext.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
        osc2.start(audioContext.currentTime);
        osc2.stop(audioContext.currentTime + 0.5);
      }, 600);
    } catch (e) {
      console.warn('Audio not supported', e);
    }
  }

  function startTimerAlert() {
    timerAlertActive = true;
    timerAlertStartTime = Date.now();
    timerStartBtn.classList.add('alerting');
    timerStartBtn.classList.add('active');
    timerStartBtn.innerHTML = '<i class="fas fa-stop"></i>';
    timerStartBtn.title = 'Stop Alert';
    timerAlertInfo.style.display = 'block';

    playChime();
    updateTimerToast();

    timerAlertInterval = setInterval(() => {
      const elapsed = Date.now() - timerAlertStartTime;
      if (elapsed >= timerAlertDuration) {
        stopTimerAlert();
        timerStartBtn.innerHTML = '<i class="fas fa-play"></i>';
        timerStartBtn.classList.remove('active');
        timerStartBtn.title = 'Start';
        updateTimerToast();
      } else {
        playChime();
      }
      saveTimerState();
    }, 5000);

    saveTimerState();
  }

  function stopTimerAlert() {
    timerAlertActive = false;
    timerStartBtn.classList.remove('alerting');
    timerStartBtn.classList.remove('active');
    timerStartBtn.innerHTML = '<i class="fas fa-play"></i>';
    timerStartBtn.title = 'Start';
    timerAlertInfo.style.display = 'none';
    if (timerAlertInterval) {
      clearInterval(timerAlertInterval);
      timerAlertInterval = null;
    }
    updateTimerToast();
    saveTimerState();
  }

  function toggleTimer() {
    if (timerAlertActive) {
      stopTimerAlert();
      return;
    }
    if (timerRunning) {
      pauseTimer();
    } else {
      startTimer();
    }
  }

  function startTimerInterval() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (timerSeconds > 0) {
        timerSeconds--;
        updateTimerDisplay();
        updateTimerToast();
      } else {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        timerRunning = false;
        showToast('Timer complete!', 'success');
        startTimerAlert();
      }
      saveTimerState();
    }, 1000);
  }

  function startTimer() {
    if (timerSeconds <= 0) {
      showToast('Set a time first', 'warning');
      return;
    }
    timerRunning = true;
    timerStartBtn.innerHTML = '<i class="fas fa-stop"></i>';
    timerStartBtn.classList.add('active');
    timerStartBtn.title = 'Stop';
    startTimerInterval();
    updateTimerToast();
    saveTimerState();
  }

  function pauseTimer() {
    timerRunning = false;
    timerStartBtn.innerHTML = '<i class="fas fa-play"></i>';
    timerStartBtn.classList.remove('active');
    timerStartBtn.title = 'Start';
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    updateTimerToast();
    saveTimerState();
  }

  function resetTimer() {
    stopTimerAlert();
    pauseTimer();
    timerSeconds = timerInitialSeconds;
    updateTimerDisplay();
    updateTimerToast();
    saveTimerState();
  }

  /* ==================== EXPORT / IMPORT ==================== */
  function exportData() {
    const data = { categories, recipes, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'recipe-book-export-' + (new Date()).toISOString().slice(0, 10) + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('Export complete', 'success');
  }

  function handleImportFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = function(ev) {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (parsed.categories && Array.isArray(parsed.categories)) categories = parsed.categories;
        if (parsed.recipes && Array.isArray(parsed.recipes)) recipes = parsed.recipes;
        saveData();
        populateCategoryDropdowns();
        renderCategories();
        renderRecipes();
        showToast('Import complete', 'success');
      } catch (err) {
        showToast('Invalid JSON file', 'error');
      }
    };
    r.readAsText(file);
    e.target.value = '';
  }

  /* ==================== POINTER DRAG ==================== */
  function onPointerDown(e) {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    const row = handle.closest('.ingredient-row');
    if (!row) return;
    e.preventDefault();
    pointerDrag.active = true;
    pointerDrag.element = row;
    pointerDrag.container = row.parentElement;
    const rect = row.getBoundingClientRect();
    pointerDrag.offsetY = (e.clientY || 0) - rect.top;
    pointerDrag.offsetX = (e.clientX || 0) - rect.left;
    pointerDrag.lastClientY = e.clientY || 0;
    pointerDrag.placeholder = document.createElement('div');
    pointerDrag.placeholder.className = 'ingredient-row placeholder';
    pointerDrag.placeholder.style.height = rect.height + 'px';
    pointerDrag.container.insertBefore(pointerDrag.placeholder, row.nextSibling);
    row.style.position = 'absolute';
    row.style.left = (rect.left + window.scrollX) + 'px';
    row.style.top = (rect.top + window.scrollY) + 'px';
    row.style.width = rect.width + 'px';
    row.style.zIndex = 1000;
    row.classList.add('dragging');
    startPointerAutoScroll();
  }

  function onPointerMove(e) {
    if (!pointerDrag.active || !pointerDrag.element) return;
    e.preventDefault();
    const clientY = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
    const clientX = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
    pointerDrag.lastClientY = clientY;
    const pageY = clientY + window.scrollY;
    const pageX = clientX + window.scrollX;
    const top = pageY - pointerDrag.offsetY;
    const left = pageX - pointerDrag.offsetX;
    const minTop = 0;
    const maxTop = Math.max(document.documentElement.scrollHeight - pointerDrag.element.offsetHeight, 0);
    const boundedTop = Math.max(minTop, Math.min(maxTop, top));
    pointerDrag.element.style.top = boundedTop + 'px';
    pointerDrag.element.style.left = left + 'px';
    const after = getDragAfterElement(pointerDrag.container, clientY);
    if (after == null) {
      pointerDrag.container.appendChild(pointerDrag.placeholder);
    } else {
      if (after !== pointerDrag.placeholder) {
        pointerDrag.container.insertBefore(pointerDrag.placeholder, after);
      }
    }
  }

  function onPointerUp(e) {
    if (!pointerDrag.active) return;
    const el = pointerDrag.element, placeholder = pointerDrag.placeholder, container = pointerDrag.container;
    if (el && placeholder && container) {
      container.insertBefore(el, placeholder);
      placeholder.remove();
      el.style.position = '';
      el.style.top = '';
      el.style.left = '';
      el.style.width = '';
      el.style.zIndex = '';
      el.classList.remove('dragging');
    }
    stopPointerAutoScroll();
    pointerDrag.active = false;
    pointerDrag.element = null;
    pointerDrag.container = null;
    pointerDrag.offsetX = 0;
    pointerDrag.offsetY = 0;
    pointerDrag.placeholder = null;
    pointerDrag.lastClientY = null;
    pointerDrag.scrollInterval = null;
  }

  function startPointerAutoScroll() {
    if (pointerDrag.scrollInterval) clearInterval(pointerDrag.scrollInterval);
    pointerDrag.scrollInterval = setInterval(() => {
      if (!pointerDrag.element || pointerDrag.lastClientY === null) return;
      const clientY = pointerDrag.lastClientY;
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
      const threshold = Math.max(64, Math.floor(viewportHeight * 0.12));
      const scrollStep = 16;
      if (clientY < threshold) {
        window.scrollBy({ top: -scrollStep, behavior: 'auto' });
      } else if (clientY > viewportHeight - threshold) {
        window.scrollBy({ top: scrollStep, behavior: 'auto' });
      }
    }, 25);
  }

  function stopPointerAutoScroll() {
    if (pointerDrag.scrollInterval) {
      clearInterval(pointerDrag.scrollInterval);
      pointerDrag.scrollInterval = null;
    }
  }

  function getDragAfterElement(container, clientY) {
    const draggableElements = [...container.querySelectorAll('.ingredient-row:not(.dragging):not(.placeholder)')];
    return draggableElements.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = clientY - (box.top + box.height / 2);
      if (offset < 0 && offset > closest.offset) {
        return { offset: offset, element: child };
      } else {
        return closest;
      }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  applyViewMode();
})();
</script>
